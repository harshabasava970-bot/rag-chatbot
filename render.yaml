services:
  - type: web
    name: rag-chatbot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: CHUNK_SIZE
        value: "1000"
      - key: CHUNK_OVERLAP
        value: "200"
      - key: TOP_K_RESULTS
        value: "5"
      - key: PINECONE_API_KEY
        value: ""
      - key: PINECONE_ENVIRONMENT
        value: ""
      - key: PINECONE_INDEX_NAME
        value: rag-documents
      # OPENAI_API_KEY and ALLOWED_ORIGINS must be set manually in Render dashboard
