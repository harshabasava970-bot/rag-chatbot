services:
  - type: web
    name: rag-chatbot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: CHUNK_SIZE
        value: "1000"
      - key: CHUNK_OVERLAP
        value: "200"
      - key: TOP_K_RESULTS
        value: "5"
      # Set these manually in Render dashboard:
      # GROQ_API_KEY  → free key from https://console.groq.com
      # ALLOWED_ORIGINS → your Vercel URL e.g. https://rag-chatbot-xyz.vercel.app
