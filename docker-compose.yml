version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rag-chatbot-backend:latest
    container_name: rag_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Persist uploaded PDFs and FAISS index across container restarts
      - uploads_data:/app/uploads
    environment:
      - APP_ENV=production
      - UPLOAD_DIR=/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - rag_network

volumes:
  uploads_data:
    driver: local

networks:
  rag_network:
    driver: bridge
